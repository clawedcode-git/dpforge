<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DpForge - Display Picture Forge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Berkeley+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <h1 class="logo-text">DpForge</h1>
            </div>
            <p class="tagline">Forge your perfect avatar in seconds</p>
        </header>

        <div class="forge-card">
            <div class="status-bar">
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot"></span>
                    <span class="status-text">Checking...</span>
                </div>
            </div>

            <div class="section">
                <label for="promptInput" class="input-label">Describe your avatar</label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="promptInput" 
                        class="prompt-input" 
                        placeholder="a mystical forest creature..."
                        maxlength="200"
                    >
                    <span class="char-count"><span id="charCount">0</span>/200</span>
                </div>
                <div class="suggestions">
                    <span class="suggestions-label">Try:</span>
                    <button class="suggestion-chip" data-prompt="a wise owl">wise owl</button>
                    <button class="suggestion-chip" data-prompt="space explorer">space explorer</button>
                    <button class="suggestion-chip" data-prompt="forest spirit">forest spirit</button>
                    <button class="suggestion-chip" data-prompt="cyberpunk robot">cyberpunk robot</button>
                </div>
            </div>

            <div class="section">
                <label class="input-label">Choose style</label>
                <div class="style-buttons">
                    <button class="style-btn active" data-style="realistic">Realistic</button>
                    <button class="style-btn" data-style="cartoon">Cartoon</button>
                    <button class="style-btn" data-style="anime">Anime</button>
                    <button class="style-btn" data-style="abstract">Abstract</button>
                </div>
            </div>

            <button class="forge-btn" id="forgeBtn" disabled>
                <span class="btn-text">Forge Avatar</span>
                <span class="btn-loading">
                    <svg class="spinner" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round"/></svg>
                    Forging...
                </span>
            </button>

            <div class="result-section" id="resultSection">
                <div class="result-placeholder" id="placeholder">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <p>Your avatar will appear here</p>
                </div>
                <div class="result-image-container hidden" id="imageContainer">
                    <img id="resultImage" src="" alt="Generated avatar">
                    <button class="download-btn" id="downloadBtn">Download</button>
                </div>
                <div class="error-message hidden" id="errorMessage">
                    <p id="errorText">Something went wrong</p>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>Powered by <a href="https://huggingface.co" target="_blank" rel="noopener">HuggingFace</a></p>
            <p class="hint">Set HF_TOKEN for faster generation</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
