<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DpForge - Display Picture Forge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-effects">
        <div class="ember ember-1"></div>
        <div class="ember ember-2"></div>
        <div class="ember ember-3"></div>
        <div class="ember ember-4"></div>
        <div class="ember ember-5"></div>
    </div>

    <main class="container">
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M32 4L8 20V44L32 60L56 44V20L32 4Z" stroke="url(#logoGrad)" stroke-width="2" fill="none"/>
                    <path d="M32 12L16 22V42L32 52L48 42V22L32 12Z" fill="url(#logoGrad)" opacity="0.3"/>
                    <circle cx="32" cy="32" r="8" fill="url(#logoGrad)"/>
                    <defs>
                        <linearGradient id="logoGrad" x1="8" y1="4" x2="56" y2="60">
                            <stop offset="0%" stop-color="#ff6b35"/>
                            <stop offset="100%" stop-color="#2ec4b6"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1 class="logo-text">DpForge</h1>
            </div>
            <p class="tagline">Forge your perfect avatar in seconds</p>
        </header>

        <div class="forge-card">
            <div class="status-bar">
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot"></span>
                    <span class="status-text">Checking Ollama...</span>
                </div>
            </div>

            <div class="prompt-section">
                <label for="promptInput" class="input-label">Describe your avatar</label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="promptInput" 
                        class="prompt-input" 
                        placeholder="a mystical forest creature..."
                        maxlength="200"
                    >
                    <span class="char-count"><span id="charCount">0</span>/200</span>
                </div>
                <div class="suggestions">
                    <span class="suggestions-label">Try:</span>
                    <button class="suggestion-chip" data-prompt="a wise owl">wise owl</button>
                    <button class="suggestion-chip" data-prompt="space explorer">space explorer</button>
                    <button class="suggestion-chip" data-prompt="forest spirit">forest spirit</button>
                    <button class="suggestion-chip" data-prompt="cyberpunk robot">cyberpunk robot</button>
                </div>
            </div>

            <div class="style-section">
                <label class="input-label">Choose style</label>
                <div class="style-buttons">
                    <button class="style-btn active" data-style="realistic">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="8" r="5"/>
                            <path d="M3 21v-2a7 7 0 0 1 7-7h4a7 7 0 0 1 7 7v2"/>
                        </svg>
                        Realistic
                    </button>
                    <button class="style-btn" data-style="cartoon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                            <line x1="9" y1="9" x2="9.01" y2="9"/>
                            <line x1="15" y1="9" x2="15.01" y2="9"/>
                        </svg>
                        Cartoon
                    </button>
                    <button class="style-btn" data-style="anime">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 3c-1.5 0-3 1-3 3 0 1 .5 2 1.5 2.5L9 12l1.5 1.5L9 18c2-1 4-3 4-6 0-2-1.5-3-3-3"/>
                            <path d="M12 3c1.5 0 3 1 3 3 0 1-.5 2-1.5 2.5L15 12l-1.5 1.5L15 18c-2-1-4-3-4-6 0-2 1.5-3 3-3"/>
                        </svg>
                        Anime
                    </button>
                    <button class="style-btn" data-style="abstract">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/>
                            <line x1="12" y1="22" x2="12" y2="15.5"/>
                            <polyline points="22 8.5 12 15.5 2 8.5"/>
                        </svg>
                        Abstract
                    </button>
                </div>
            </div>

            <button class="forge-btn" id="forgeBtn" disabled>
                <span class="btn-text">Forge Avatar</span>
                <span class="btn-loading">
                    <svg class="spinner" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="31.4 31.4" stroke-linecap="round"/>
                    </svg>
                    Forging...
                </span>
            </button>

            <div class="result-section" id="resultSection">
                <div class="result-placeholder" id="placeholder">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <p>Your avatar will appear here</p>
                </div>
                <div class="result-image-container hidden" id="imageContainer">
                    <img id="resultImage" src="" alt="Generated avatar">
                    <button class="download-btn" id="downloadBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Download
                    </button>
                </div>
                <div class="error-message hidden" id="errorMessage">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </svg>
                    <p id="errorText">Something went wrong</p>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>Powered by <a href="https://ollama.ai" target="_blank" rel="noopener">Ollama</a></p>
            <p class="hint">Make sure Ollama is running with an image generation model</p>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
